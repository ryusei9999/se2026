<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f0e0d;
            --paper: #f5f2ed;
            --cream: #ede9e1;
            --accent: #c84b2f;
            --accent2: #2f6bc8;
            --muted: #8a8278;
            --border: #d4cfc7;
            --success: #2a7a4b;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        /* Flash messages */
        .flash-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .flash {
            padding: 0.75rem 1.25rem;
            border-left: 3px solid;
            font-size: 0.875rem;
            font-family: 'Noto Sans JP', sans-serif;
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease;
        }
        .flash.success { border-color: var(--success); color: var(--success); }
        .flash.error { border-color: var(--accent); color: var(--accent); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
    </div>

    {% block content %}{% endblock %}

    <script>
        // Auto-dismiss flash messages
        setTimeout(() => {
            document.querySelectorAll('.flash').forEach(el => {
                el.style.transition = 'opacity 0.4s';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 400);
            });
        }, 3000);
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
